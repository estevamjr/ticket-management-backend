name: Python MVP CI

# 1. Quando este script vai rodar? (Sempre que fizer um Push para a branch main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # 2. Qual máquina o GitHub vai alugar de graça para você? (Um Linux Ubuntu novo)
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixar o código do seu repositório para a máquina virtual
    - name: Checkout repository
      uses: actions/checkout@v4

    # Passo 2: Instalar o Python nela
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Passo 3: Instalar as bibliotecas que seu MVP precisa (Flask, Scikit-Learn, etc.)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Passo 4: RODAR O SEU PYTEST (A hora da verdade!)
    - name: Run Tests with PyTest
      run: |
        pytest